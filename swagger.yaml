    TransactionTypeEnum:
      type: string
      description:  Indicates the nature of the transaction performed, providing context for how funds or assets were handled.
      oneOf:
      - title: Deposit
        description:  Funds were added to the wallet through a transfer from another source, marking an inflow of assets to the entity’s wallet (screenshot proof available).
      - title: Withdraw
        description: Funds were removed from the wallet through a transfer to another destination, marking an outflow of assets from the entity’s wallet (screenshot proof available).
      - title: Direct
        description:  No deposit or withdrawal was necessary, as the wallet was already connected to an active cluster (screenshot proof available).
      - title: External
        description: Data was collected or observed from external sources without direct interaction with the wallet. This typically refers to information gathered from scrapped data (screenshot proof unavailable).
      - title: Private
        description: The is used to represent private enhancing tokens like Monero (screenshot proof available).
      - title: Verified OSINT
        description: Data was collected or observed from a vetted source, usually an organization that verifies the tags (such as OFAC) (screenshot proof unavailable).
      - title: Community OSINT
        description: Data gathered from open-source platforms where contributions come from a wide range of users, often resulting in lower confidence due to the unverified nature of the information. Examples include platforms like Labelcloud and Arkham, or individuals posting on Twitter claiming discoveries such as identifying Tesla’s wallet or reporting through sites like Bitcoinabuse.       
    CategoryIdEnum:
      type: string
      oneOf:
      - title: CRIM
        description: Criminal Enterprises category encompasses a broad spectrum of illicit activities conducted with the intention to gain profit or achieve some unlawful objectives. They are often organized and executed within the framework of larger criminal operations or networks.
      - title: ATM
        description: Cryptoasset ATMs also known as Automated Teller Machines, are self-service kiosks enabling individuals to buy or sell Bitcoin and other cryptocurrencies using cash or debit cards
      - title: CEFI
        description: A financial system where traditional financial services (such as trading, lending, and borrowing) are managed by centralized entities or institutions. In CeFi, a trusted intermediary holds and controls the users’ funds and data, often requiring compliance with regulations like KYC and AML (Anti-Money Laundering).
      - title: CUST
        description: Custodial Services refer to third-party providers that manage and safeguard cryptocurrency assets on behalf of their clients, holding the private keys and offering security and ease of access to the funds. 
      - title: DON
        description: A donation entity in crypto refers to an organization or platform that accepts charitable contributions in the form of cryptocurrencies, leveraging blockchain technology to facilitate transparent and efficient donation processes.       
      - title: ETF
        description: CRefers to the various parties or organizations involved in the creation, management, and trading of Exchange-Traded Funds (ETFs). These entities play specific roles in the operation and oversight of ETFs in the financial markets.      
      - title: EXTR
        description: Extremist and violent groups are organizations or collectives that hold radical ideologies and often engage in or promote violent activities to achieve political, religious, or ideological objectives.
      - title: EXPL
        description: Exploits also referred to as hacks are techniques that take advantage of vulnerabilities in cryptocurrency platforms, software, or protocols to conduct unauthorized actions, such as theft or unauthorized access to funds.        
      - title: FCT
        description: A crypto faucet is an app or a website that distributes small amounts of cryptocurrencies as a reward for completing easy tasks.         
      - title: MINE
        description: A mining entity in crypto refers to an individual or organization that uses computational power to validate and secure transactions on a blockchain network, earning rewards in the form of newly minted cryptocurrencies.          
      - title: OTH
        description: The "Others" category encompasses a group of entities for which we have yet to determine a proper classification, as they do not align with our existing category definitions. Additionally, these entities are characterized by a low number of attributed characteristics.        
      - title: MLWR
        description: Malwares are malicious software designed to steal, manipulate, or disrupt cryptocurrency assets and transactions. They exploit vulnerabilities to access private keys, wallet information, or to illicitly mine cryptocurrencies.         
      - title: FORU
        description: Forums are clearnet and dark web platforms where discussions are being held and may occasionally involve the exchange of information related to illicit activities including crypto transactions.        
      - title: SHOP
        description: A platform, whether an online website or a physical store, that offers a variety of products or services, such as clothes, jewelry, cars, or other merchandise, available for purchase using cryptocurrency.        
      - title: TF
        description: TF refers to organizations or entities that receive money or financial support from individuals or companies to back terrorist actions tied to specific ideology.        
      - title: SCAM
        description: Scams are deceptive schemes designed to defraud individuals or groups by exploiting their interest in cryptocurrencies.
      - title: PSP
        description: PSPs (Payment Service Providers) refer to companies that facilitate businesses in accepting cryptocurrencies as payment, offering solutions for processing transactions, converting digital currencies to fiat, and ensuring secure transfers.        
      - title: PPE
        description: Entities that have publicly acknowledged their involvement with cryptocurrency, such as owning wallets or accepting payments, or those identified through sanctions or public regulatory frameworks.        
      - title: MIXR
        description:  A cryptocurrency mixing service is a service offered to mix potentially identifiable or 'tainted' cryptocurrency funds and pool them with others, so as to obscure the trail back to the fund's original source.        
      - title: GM
        description: Gambling entities refer to online platforms or services that offer gambling games or betting opportunities where transactions and wagers are made using cryptocurrencies.        
      - title: INFT
        description: NFTs associated with illicit activities such as scams, exploits, or used in propagating hate speech, among other unlawful endeavors like CSAM and TF.        
      - title: DNM
        description: A Darknet market is a commercial website that operates on the darkweb including telegram. It functions as a black market for illicit goods, such as drugs, weapons, counterfeit currency, stolen credit card information, steroids, forged documents, and more.        
      - title: VNH
        description: A virtual private network (VPN) gives users online privacy and anonymity by creating a private network from a public internet connection. A Hosting is a service that offers hosting services such as Domain hosting, VPS ( virtual machine sold as a service by an Internet hosting), bulletproof hosting (web hosting resilient to cyberattacks). whilst a virtual private network (VPN) gives users online privacy and anonymity by creating a private network from a public internet connection.        
      - title: DEFI
        description: A financial ecosystem built on blockchain technology that operates without intermediaries, allowing users to access services like lending, borrowing, trading, and investing directly through smart contracts. In DeFi, control and ownership of assets remain with the user, and transactions are facilitated by decentralized protocols rather than centralized institutions.    
      - title: CSAM
        description: Child Sexual Abuse Material (CSAM) refers not only to platforms but also to any entities involved in displaying and/or selling content that depicts sexually explicit conduct involving minors. This includes images, videos, and other forms of media showcasing such illegal activities.
        
    KycVerification:
      type: array
      description: Lists the types of documents or information that have been used to verify the identity of the entity or individual as part of the Know Your Customer (KYC) process.
      items:
        type: string
        enum:
          - ID
          - Passport
          - Utility Bill
          - Driving License
          - Selfie
          - Phone Number
    MediaType:
      type: array
      description: Specifies the format or medium in which Child Sexual Abuse Material (CSAM) is distributed or consumed. These media types can include images, videos, audio recordings, or text-based descriptions, all of which are illegal.
      items:
        type: string
        enum:
          - Images
          - Videos
          - Audio
          - Text
          - Live Streams
    OperationalStatusEnum:
      type: string
      description: Indicates the current availability and functionality of a website. This status reflects whether the website is accessible to users, temporarily unavailable, or undergoing updates.
      oneOf:
      - title: Open
        description: The website is fully operational and accessible to users.
      - title: Closed
        description: The website is not currently available or operational.
      - title: Updating
        description: The website is undergoing maintenance or updates, and may have limited or no accessibility during this period.
    IsLicensedEnum:
      type: string
      description: Indicates whether the entity holds a valid license to operate within its respective jurisdiction. This status helps determine the entity’s regulatory compliance.
      enum:
