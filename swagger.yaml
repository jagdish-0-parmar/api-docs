              type: string
              example: https://source-link.com
            mediaType:
              description: Specifies the format or medium in which Child Sexual Abuse Material (CSAM) is distributed or consumed. These media types can include images, videos, audio recordings, or text-based descriptions, all of which are illegal.
              type: array
              items:
                $ref: '#/components/schemas/MediaType'
            membershipAccess:
              description: Describes the various methods by which individuals can gain access to platforms distributing Child Sexual Abuse Material (CSAM). These methods may involve different forms of authentication, payment, or verification.
              type: string                
              
