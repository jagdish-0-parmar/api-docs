              type: array
              items:
                type: string
                oneOf:
                - title: Clearnet
                  description: Refers to websites or platforms accessible on the standard internet (Clearnet) that are involved in the distribution or facilitation of Child Sexual Abuse Material (CSAM).
                  
                - title: Darkweb
                  description: Refers to hidden websites and platforms on the dark web that are involved in the illegal distribution or facilitation of Child Sexual Abuse Material (CSAM). These sites are typically accessed via anonymity networks like Tor, and operate beyond standard internet oversight, making them more difficult to detect and shut down.
                  
                - title: Single Vendor
                  description: Refers to a specific platform, website, or operation run by a single entity or individual dedicated to distributing Child Sexual Abuse Material (CSAM). These operations are typically managed by one vendor or group that controls the content and transactions, often for profit or other illicit purposes.
                  
                - title: Multi vendor
                  description: Refers to platforms or marketplaces where multiple individuals or entities can sell, trade, or distribute Child Sexual Abuse Material (CSAM). These platforms typically function as marketplaces, allowing various vendors to upload and sell illegal content, often using anonymous payment methods like cryptocurrencies.
            osint:
              description: Refers to information gathered from publicly available sources, often used for investigative purposes. OSINT data can include anything from social media profiles to publicly accessible databases, websites, news articles, and more.
