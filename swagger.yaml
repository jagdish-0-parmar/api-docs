openapi: 3.1.0

info:
  title: Chainlabs API
  description: |-
    ### 
    
    The Chainlabs API provides an automated way of retrieving traced seed addresses, corresponding metadata, and screenshot proofs to replace the monthly manual CSV deliveries.
    
    To retrieve all historical and newly added entities, traces, and screenshots, use the */entities* and */traces* endpoints. To receive updates on modifications or deletions of existing data, use the */sync_entities* and */sync_traces* endpoints. 
  version: 0.1.0
paths:
  /entities:
    post:
      tags:
        - Entities
      summary: Get entities filtered by entityIds, categoryIds, entityName, URL, dateTimeAddedFrom, dateTimeAddedTo
      description: Returns the metadata for the entities that match the criteria provided in the request. The metadata will have fields specific to the category of the entity. All entities are returned if the request is empty.
      operationId: entities
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntitiesRequest'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntitiesResponse'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized error
        '500':
          description: Internal server error
  /traces:
    post:
      tags:
        - Traces
      summary: Get traces filtered by traceIds, entityIds, categoryIds, tokens, transactionTypes, dateTimeAddedFrom, dateTimeAddedTo
      description: Returns the traces that match the criteria provided in the request. All traces are returned if the request is empty.
      operationId: traces
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TracesRequest'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TracesResponse'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized error
        '500':
          description: Internal server error
  /sync_entities:
    post:
      tags:
        - Entities
      summary: Get sync events (modification/deletion) for existing entities filtered by entityIds, dateTimeUpdatedFrom, dateTimeUpdatedTo
      description: Returns sync events (modification/deletion) for the entities that match the criteria provided in the request. All sync events are returned if the request is empty.
      operationId: syncEntities
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncEntitiesRequest'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncEntitiesResponse'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized error
        '500':
          description: Internal server error
  /sync_traces:
    post:
      tags:
        - Traces
      summary: Get sync events (modification/deletion) for existing traces filtered by traceIds, dateTimeUpdatedFrom, dateTimeUpdatedTo
      description: Returns sync events (modification/deletion) for the traces that match the criteria provided in the request. All sync events are returned if the request is empty.
      operationId: syncTraces
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncTracesRequest'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncTracesResponse'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized error
        '500':
          description: Internal server error
components:
  schemas:
    Entity:
      description: The entity object contains all the metadata for an entity.
      type: object
      properties:
        entityId:
          description: Unique integer assigned to each entity.
          type: integer
          format: int64
          example: 10
        name:
          description: The official or recognized name used to identify the entity. This name is used in all references, documentation, and records related to the entity.
          type: string
          example: Binance
        categoryId:
           $ref: '#/components/schemas/CategoryIdEnum'
        url:
          type: string
          example: https://binance.com
        operationalStatus:
          $ref: '#/components/schemas/OperationalStatusEnum'
        dateTimeAdded:
          type: string
          description: Date and time when the entity was added to the database.
          format: date-time
          example: 2017-07-21T17:32:28Z
        dateTimeUpdated:
          type: string
          description: Date and time when the entity was last updated.
          format: date-time
          example: 2017-07-21T17:32:28Z
        dateTimeMetadataChecked:
          type: string
          description: Date and time when the metadata was last checked.
          format: date-time
          example: 2017-07-21T17:32:28Z
    ATM:
      description: Cryptoasset ATMs also known as Automated Teller Machines, are self-service kiosks enabling individuals to buy or sell Bitcoin and other cryptocurrencies using cash or debit cards
      allOf:
        - $ref: '#/components/schemas/Entity'
        - type: object
          properties:
            countryOfIncorporation:
              description: Specifies the country where the entity is legally registered and incorporated. This information is used to identify the jurisdiction governing the entity’s legal status and operations.
              type: string
              example: US
            countryOfIncorporationSourceLink:
              description: Provides the URL or link to the source that verifies the country of incorporation for the entity. This link serves as a reference for the information provided.
              type: string
              example: https://source-link.com
            kycNotes:
              description: Additional information or observations related to the Know Your Customer (KYC) verification process for the entity. This may include specific details about the verification, exceptions, or any issues encountered.
              type: string
              example: note
            kycVerification:
              $ref: '#/components/schemas/KycVerification'
            locationUrl:
              type: string
              description: Specifies the physical address or geographical coordinates where the ATM is installed.
              example: https://maps.app.goo.gl/oe4QrRpohBPHZZVy8
            operatedBy:
              description: Identifies the organization, company, or individual responsible for managing and maintaining the ATM.
              type: string
              example: Localcoin
            osint:
              description: Refers to information gathered from publicly available sources, often used for investigative purposes. OSINT data can include anything from social media profiles to publicly accessible databases, websites, news articles, and more.
              type: string
            supportedFiat:
              description: List of supportedFiat.
              type: array
              items:
                $ref: '#/components/schemas/SupportedFiatEnum'
            isLicensed:
              $ref: '#/components/schemas/IsLicensedEnum'
            countryOfLicense:
              description: Specifies the country in which the entity has obtained its operating license. This identifies the jurisdiction that governs the entity’s licensed activities.
              type: string
              example: US
            countryOfLicenseSourceLink:
              description: Provides the URL or link to the source that confirms the country where the entity’s license was issued. This link serves as a reference for verification purposes.
              type: string
              example: https://source-link.com
    CRIM:
      description: Criminal Enterprises category encompasses a broad spectrum of illicit activities conducted with the intention to gain profit or achieve some unlawful objectives. They are often organized and executed within the framework of larger criminal operations or networks.
      allOf:
        - $ref: '#/components/schemas/Entity'
        - type: object
          properties:
            tags:
              description: Classifies the type or category of content associated with an entity.
              type: array
              items:
                type: string
                oneOf:
                - title: Violent Crimes
                  description: (Assaults and Battery - Includes beatings, maiming, stabbing, breaking of bones, brutal attacks, muscular warnings.), (Homicide and Manslaughter - Encompasses activities like killings, torture, murder, executions, sniper jobs, assassination, making killings look like accidents.), (Sexual Offenses - Covers all instances of rape, necrophilia, incest, and other non-consensual sexual activities.)
                  
                - title: Exploitative and Coercive Crimes
                  description: (Kidnapping and Abduction - Involves kidnapping, abductions, and related activities aimed at unlawfully detaining individuals.), (Blackmail and Extortion - Includes blackmail, threats, and extortion by exploiting victims' vulnerabilities.)
                  
                - title: Property and Financial Crimes
                  description: (Theft and Burglary - Pertains to theft, burglary, plant robbery, and other forms of property theft.), (Arson and Damage - Encompasses arson, sabotage, damage to goods and properties, setting fires to homes or workplaces.), (Fraud and Cybercrime - Includes hacking (website, email, social media), DDoS attacks, grades changing, and other forms of deception and cyber attacks.)
                  
                - title: Substance Related Crimes
                  description: (Drug Trafficking - Deals with the illegal trade and distribution of drugs like cannabis, ketamine, ecstasy, opioids, cocaine, speed.), (Illegal Arms Trafficking - Involves the sale and distribution of illegal firearms, explosives, grenades, sniper rifles.), (Controlled Substance Trafficking - "Purchasing research chemicals" could be categorized here, especially if these chemicals are intended for illegal use or are controlled substances.)
                  
                - title: Morbid and Shock Content
                  description: (Gore and Snuff - Involves the distribution or creation of content showcasing real-life violence, death, and sexual violence.), (Extreme Fetishes - Encompasses activities related to extreme fetish, BDSM, bestiality, revenge porn, and other explicit or extreme content.)
                  
                - title: Psychological and Emotional Crimes
                  description: (Torture and Cruelty - Includes all forms of physical and psychological torture, severe torture to death, and other cruel treatments.), (Ruination and Sabotage - Activities aimed at wrecking lives, bio attacks, paralyzing, depriving of vision, and other forms of personal sabotage.)
            osint:
              description: Refers to information gathered from publicly available sources, often used for investigative purposes. OSINT data can include anything from social media profiles to publicly accessible databases, websites, news articles, and more.
              type: string
            isScam:
              $ref: '#/components/schemas/IsScamEnum'
            scamSource:
              description: Identifies the origin or source from which the scam information about the entity was obtained. This could include reports, databases, user submissions, or other investigative sources.
              type: string
              example: https://source-link.com
              
    CEFI:
      description: A financial system where traditional financial services (such as trading, lending, and borrowing) are managed by centralized entities or institutions. In CeFi, a trusted intermediary holds and controls the users’ funds and data, often requiring compliance with regulations like KYC and AML (Anti-Money Laundering).
      allOf:
        - $ref: '#/components/schemas/Entity'
        - type: object
          properties:
            tags:
              description: Classifies the type or category of content associated with an entity.
              type: array
              items:
                type: string
                oneOf:
                - title: Global Exchange
                  description: A global exchange is a platform that operates without country-specific KYC policies, allowing individuals from various countries to register and engage in buying or selling cryptocurrencies.
                  
                - title: Regional Exchange
                  description: A Regional Exchange is a platform restricted by country or region-specific KYC policies, available only to residents of a certain geographical area. It allows only these residents to buy or sell cryptocurrencies.
                  
                - title: Telegram Exchange
                  description: A Telegram exchange is an exchange that operates some or all of its services on Telegram.
                  
                - title: On Off Ramp
                  description: An on-off ramp is a platform or service within an exchange that enables users to buy and sell cryptocurrency using credit cards or bank transfers, without offering additional trading services like staking or crypto-only spot transactions.
                  
                - title: Instant Exchange
                  description: An instant exchange service is a platform that allows its users to buy and sell cryptocurrencies with manual approval. It utilizes online payment methods like PayPal, Alipay, Wise, among others, as well as traditional payment options.
                  
                - title: OTC Desk
                  description: An OTC desk is a platform or service on an exchange that involves high-volume trading to avoid market slippage and sometimes, it may require an upfront deposit.
                  
                - title: Swap Service
                  description: A swap service in crypto exchanges enables instant, direct cryptocurrency conversions without using traditional order books, often leveraging liquidity pools.
                  
                - title: Centralized Bridge
                  description: A centralized Bridge is a service managed by a central authority that facilitates the transfer of assets between different blockchain networks, providing ease of use but requiring trust in the central entity.
                  
                - title: P2P Exchange
                  description: Centralized P2P services are platforms that facilitate direct cryptocurrency transactions between users but are managed and overseen by a central authority or company. While users trade directly with each other, the platform itself controls the escrow services, user verification, and dispute resolution.             
                  
            countryOfIncorporation:
