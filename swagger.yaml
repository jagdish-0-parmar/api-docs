                - title: Derivative And Synthetic Assets
                  description: Derivative and Synthetic Assets entities leverage smart contracts, oracles, and collateralization mechanisms, they provide users with advanced tools for hedging, speculation, and accessing a diverse array of assets.
                  
                - title: DAO
                  description: DAO entities, or Decentralized Autonomous Organizations, are entities in the decentralized finance (DeFi) ecosystem that operate based on rules encoded in smart contracts. These rules govern the organization’s operations, decision-making processes, and governance structures, enabling them to function without centralized control.
                  
                - title: Yield Farming and Liquidity Mining
                  description: This represents a new category of financial instrument other than exchanges that comprises of yields, loans, insurance and staking platform. Example is Cream finance, Alchemix, Aave etc.
                  
                - title: Infrastructure
                  description: This refers to entities that offers software, hardware, and other essential resources and services to blockchain-based products. This also includes Oracles.
                 
