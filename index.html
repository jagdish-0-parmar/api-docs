<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chainlabs API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css" />
  </head>
  <body>
    <div id="swagger-ui"></div>

    <!-- Load Swagger UI scripts from CDN -->
    <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-standalone-preset.js"></script>

    <!-- Delay initialization until all scripts are available -->
    <script>
      function initializeSwaggerUI() {
        if (typeof SwaggerUIBundle !== 'undefined') {
          SwaggerUIBundle({
            url: "https://raw.githubusercontent.com/chainlabs-ai/api-docs/main/swagger.yaml",
            dom_id: '#swagger-ui',
            deepLinking: true,
            presets: [
              SwaggerUIBundle.presets.apis,
              SwaggerUIStandalonePreset
            ],
            layout: "StandaloneLayout"
          });
        } else {
          setTimeout(initializeSwaggerUI, 100); // Retry after 100ms
        }
      }

      initializeSwaggerUI();
    </script>
  </body>
</html>
